<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGuard - Quiz de Segurança</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); width: 100%; max-width: 500px; padding: 40px; animation: slideIn 0.3s ease-out; position: relative; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h2 { color: #333; margin-bottom: 30px; text-align: center; font-size: 28px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 16px; transition: transform 0.2s, box-shadow 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .footer-link { margin-top: 20px; text-align: center; font-size: 14px; cursor: pointer; color: #667eea; text-decoration: underline; }
        .status { margin-top: 15px; text-align: center; color: #e74c3c; font-weight: 600; font-size: 14px; }
        .progress-bar { width: 100%; height: 6px; background: #e0e0e0; border-radius: 3px; margin-bottom: 30px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); transition: width 0.3s ease; }
        .quiz-question p { font-size: 18px; color: #333; margin-bottom: 20px; line-height: 1.6; }
        .answer-buttons { display: flex; gap: 15px; margin-bottom: 20px; }
        .answer-buttons button { flex: 1; padding: 14px; background: #f5f5f5; color: #333; border: 2px solid #e0e0e0; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .answer-buttons button.correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .answer-buttons button.incorrect { background: #e74c3c !important; color: white; border-color: #c0392b; }
        .answer-buttons button.disabled { cursor: not-allowed; opacity: 0.7; }
        .explanation { background: #f9f9f9; border-left: 4px solid #667eea; padding: 15px; border-radius: 4px; margin-bottom: 20px; display: none; }
        .explanation.show { display: block; }
        .explanation-title { font-weight: 600; color: #667eea; margin-bottom: 8px; }
        .explanation-text { color: #555; font-size: 14px; line-height: 1.6; }
        .quiz-navigation { display: flex; gap: 10px; margin-top: 20px; }
        .quiz-navigation button { flex: 1; padding: 10px; font-size: 14px; }
        .results-container { text-align: center; }
        .score { font-size: 48px; font-weight: 700; color: #667eea; margin: 20px 0; }
        .score-message { font-size: 18px; color: #555; margin-bottom: 30px; }
        .results-details { background: #f9f9f9; padding: 20px; border-radius: 6px; margin-bottom: 20px; text-align: left; }
        .results-details p { color: #555; margin-bottom: 10px; font-size: 14px; }
        .results-details strong { color: #667eea; }
        .hidden { display: none !important; }
        .btn-voltar-topo { position: absolute; top: 15px; left: 15px; background: none; border: none; color: #667eea; font-weight: 600; cursor: pointer; width: auto; padding: 5px; font-size: 14px; }
        .btn-voltar-topo:hover { transform: none; box-shadow: none; text-decoration: underline; }
    </style>
</head>
<body>
<div class="container" id="app">
    <h2 id="titulo">CyberGuard Login</h2>
    <div id="statusMsg" class="status"></div>
    <div id="formNome" class="form-group hidden"><label>Nome:</label><input type="text" id="inputNome" placeholder="Seu nome completo"></div>
    <div class="form-group"><label>E-mail:</label><input type="email" id="inputEmail" placeholder="seu.email@exemplo.com"></div>
    <div class="form-group"><label>Senha:</label><input type="password" id="inputSenha" placeholder="Sua senha"></div>
    <button id="btnAcao">ENTRAR</button>
    <div class="footer-link" id="btnAlternar">Não tem conta? Cadastre-se aqui</div>
</div>

<script type="module">
    const api = {
        cadastrar: async (d) => fetch("/usuarios/register", { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(d) }).then(r => r.ok ? r.json() : Promise.reject("Erro")),
        login: async (d) => fetch("/usuarios/login", { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(d) }).then(r => r.ok ? r.json() : Promise.reject("E-mail ou senha incorretos"))
    };

    let modoLogin = true;
    const app = document.getElementById('app');

    // VERIFICAÇÃO DE LOGIN AO CARREGAR A PÁGINA
    window.onload = () => {
        const usuarioLogado = localStorage.getItem('usuarioNome');
        if (usuarioLogado) {
            mostrarMenu(usuarioLogado);
        }
    };

    document.getElementById('btnAcao').onclick = async () => {
        const d = { nome: document.getElementById('inputNome').value, email: document.getElementById('inputEmail').value, senha: document.getElementById('inputSenha').value };
        document.getElementById('statusMsg').innerText = "Processando...";
        try {
            if (modoLogin) { 
                const u = await api.login(d); 
                localStorage.setItem('usuarioNome', u.nome); // Salva o nome
                alert(`Bem-vindo, ${u.nome}!`); 
                mostrarMenu(u.nome); 
            }
            else { await api.cadastrar(d); alert("Conta criada!"); document.getElementById('btnAlternar').click(); }
        } catch (e) { document.getElementById('statusMsg').innerText = e.message || "Erro"; }
    };

    document.getElementById('btnAlternar').onclick = () => {
        modoLogin = !modoLogin;
        document.getElementById('titulo').innerText = modoLogin ? "CyberGuard Login" : "Novo Cadastro";
        document.getElementById('formNome').classList.toggle('hidden');
        document.getElementById('btnAcao').innerText = modoLogin ? "ENTRAR" : "CRIAR CONTA";
        document.getElementById('btnAlternar').innerText = modoLogin ? "Não tem conta? Cadastre-se aqui" : "Já tem conta? Voltar ao Login";
    };

    let perguntas = [], respostas = [], index = 0;

    async function carregarQuiz() {
        const r = await fetch('/quiz');
        perguntas = await r.json();
        respostas = new Array(perguntas.length).fill(null);
        index = 0;
        mostrarPergunta();
    }

    function mostrarMenu(nome) {
        const saudacao = nome || localStorage.getItem('usuarioNome') || "Usuário";
        app.innerHTML = `
            <div style="text-align: center;">
                <h2 style="margin-bottom: 10px; color: #333;">Olá, ${saudacao}!</h2>
                <p style="margin-bottom: 30px; color: #666;">O que deseja fazer hoje?</p>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <button onclick="carregarQuiz()" style="padding: 15px; font-size: 16px;">📚 Fazer Quiz de Segurança</button>
                    <button onclick="window.location.href='denuncias.html'" style="padding: 15px; font-size: 16px; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">🚨 Central de Denúncias</button>
                    <button onclick="logout()" style="padding: 15px; font-size: 16px; background: #e74c3c;">🚪 Sair</button>
                </div>
            </div>`;
    }

    function logout() {
        localStorage.removeItem('usuarioNome'); // Limpa o login
        location.reload();
    }

    function mostrarPergunta() {
        const p = perguntas[index];
        const progresso = ((index + 1) / perguntas.length) * 100;
        app.innerHTML = `
            <button class="btn-voltar-topo" onclick="mostrarMenu()">← Voltar ao Menu</button>
            <div class="progress-bar"><div class="progress-fill" style="width: ${progresso}%"></div></div>
            <h2>Questão ${index + 1} de ${perguntas.length}</h2>
            <div class="quiz-question">
                <p>${p.enunciado}</p>
                <div class="answer-buttons">
                    <button id="sim" class="${respostas[index]==='sim'?(p.respostaCorreta==='sim'?'correct':'incorrect'):''} ${respostas[index]!==null?'disabled':''}">Sim</button>
                    <button id="nao" class="${respostas[index]==='nao'?(p.respostaCorreta==='nao'?'correct':'incorrect'):''} ${respostas[index]!==null?'disabled':''}">Não</button>
                </div>
                <div id="explanation" class="explanation ${respostas[index]!==null?'show':''}">
                    ${respostas[index]!==null ? `<div class="explanation-title">${respostas[index]===p.respostaCorreta?'✅ Correto!':'❌ Incorreto'}</div><div class="explanation-text">${p.explicacao}</div>` : ''}
                </div>
            </div>
            <div class="quiz-navigation">
                ${index > 0 ? '<button id="ant">← Anterior</button>' : '<div style="flex:1"></div>'}
                ${index < perguntas.length - 1 ? '<button id="prox" ${respostas[index]===null?"disabled":""}>Próximo →</button>' : '<button id="fim" ${respostas[index]===null?"disabled":""}>Finalizar</button>'}
            </div>`;

        document.getElementById('sim').onclick = () => { if(respostas[index]===null) { respostas[index]='sim'; mostrarPergunta(); } };
        document.getElementById('nao').onclick = () => { if(respostas[index]===null) { respostas[index]='nao'; mostrarPergunta(); } };
        if(document.getElementById('ant')) document.getElementById('ant').onclick = () => { index--; mostrarPergunta(); };
        if(document.getElementById('prox')) document.getElementById('prox').onclick = () => { index++; mostrarPergunta(); };
        if(document.getElementById('fim')) document.getElementById('fim').onclick = finalizarQuiz;
    }

    async function finalizarQuiz() {
        const r = await fetch('/quiz/responder', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ respostas }) });
        const res = await r.text();
        const pontuacao = parseInt(res.match(/\d+/)[0]);
        const percentual = Math.round((pontuacao / perguntas.length) * 100);
        app.innerHTML = `
            <div class="results-container">
                <h2>Quiz Finalizado!</h2>
                <div class="score">${pontuacao}/${perguntas.length}</div>
                <div class="score-message">${percentual}% de acerto</div>
                <div class="results-details">
                    <p><strong>Desempenho:</strong> ${percentual >= 70 ? 'Excelente! Você domina o assunto. 🌟' : 'Continue estudando para se proteger melhor! 📚'}</p>
                </div>
                <button onclick="mostrarMenu()">Voltar ao Menu Principal</button>
            </div>`;
    }

    window.carregarQuiz = carregarQuiz;
    window.mostrarMenu = mostrarMenu;
    window.logout = logout;
</script>
</body>
</html>
